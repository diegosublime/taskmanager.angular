<div class="list-item">
    <div class="list-item__header" routerLink="/lists/{{list()?.id}}">
        <h3 class="list-item__id">{{ list()?.id}}: {{list()?.name}}</h3>
        <p class="list-item__name">{{ list()?.description }}</p>
    </div> 
  <button class="list-item__delete-btn" (click)="deleteList()">X</button>
</div>
